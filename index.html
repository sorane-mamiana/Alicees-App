<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alicees App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0d0d0d; color: #f0f0f0; line-height: 1.7; }
    header { padding: 60px 40px 40px; border-bottom: 1px solid #222; }
    header h1 { font-size: 2.4em; font-weight: 700; letter-spacing: -0.5px; }
    header p { margin-top: 8px; color: #888; font-size: 1.05em; }
    .apps { max-width: 900px; margin: 60px auto; padding: 0 40px; }
    .apps h2 { font-size: 1.1em; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 32px; }
    .app-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 32px; margin-bottom: 24px; }
    .app-card h3 { font-size: 1.4em; margin-bottom: 8px; }
    .app-card p { color: #aaa; margin-bottom: 16px; }
    .tag { display: inline-block; background: #2a2a2a; color: #aaa; padding: 3px 10px; border-radius: 20px; font-size: 0.8em; margin-right: 6px; }
    footer { text-align: center; padding: 40px; color: #444; font-size: 0.85em; border-top: 1px solid #1a1a1a; }
    footer a { color: #666; text-decoration: none; }
    footer a:hover { color: #aaa; }
  </style>
</head>
<body>
  <header>
    <h1>Alicees App</h1>
    <p>業務を効率化するiOSアプリを開発しています。</p>
  </header>

  <div class="apps">
    <h2>Apps</h2>

    <div class="app-card">
      <h3>seisan（精算アプリ）</h3>
      <p>レシートをカメラで撮影するだけで、AIが自動で内容を読み取り、Google スプレッドシートに経費データを記録するiOSアプリです。</p>
      <span class="tag">iOS</span>
      <span class="tag">Google Sheets</span>
      <span class="tag">AI OCR</span>
    </div>
  </div>

  <footer>
    © 2026 Alicees App &nbsp;|&nbsp;
    <a href="./privacy.html">プライバシーポリシー</a> &nbsp;|&nbsp;
    <a href="./terms.html">利用規約</a> &nbsp;|&nbsp;
    e.fujii262@gmail.com
  </footer>
</body>
</html>
